<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kilometrówka">
<meta name="theme-color" content="#0f172a">
<title>Kilometrówka</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449; --text:#f1f5f9; --muted:#94a3b8;
    --accent:#22c55e; --accent2:#16a34a; --danger:#ef4444; --border:#334155;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;}
  body{padding-bottom:90px;}
  header{position:sticky;top:0;background:rgba(15,23,42,.9);backdrop-filter:blur(10px);padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;z-index:10;border-bottom:1px solid var(--border);}
  h1{font-size:20px;margin:0;font-weight:700;}
  .sub{color:var(--muted);font-size:13px;margin-top:2px;}
  main{padding:16px;max-width:520px;margin:0 auto;}
  .card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;border:1px solid var(--border);}
  .summary{display:flex;gap:10px;}
  .summary .box{flex:1;background:var(--card2);border-radius:12px;padding:12px;text-align:center;}
  .summary .box .val{font-size:20px;font-weight:700;}
  .summary .box .lab{font-size:11px;color:var(--muted);margin-top:2px;}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;}
  input,select{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;font-size:16px;}
  input:focus,select:focus{outline:none;border-color:var(--accent);}
  .row{display:flex;gap:10px;}
  .row > div{flex:1;}
  button{border:none;border-radius:12px;padding:13px;font-size:16px;font-weight:600;cursor:pointer;}
  .btn-primary{background:var(--accent);color:#04240f;width:100%;margin-top:14px;}
  .btn-primary:active{background:var(--accent2);}
  .btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border);}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);}
  .mode-toggle{display:flex;background:var(--card2);border-radius:12px;padding:4px;margin-bottom:10px;}
  .mode-toggle button{flex:1;background:transparent;color:var(--muted);padding:9px;}
  .mode-toggle button.active{background:var(--accent);color:#04240f;}
  .trip{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
  .trip:last-child{border-bottom:none;}
  .trip .left{flex:1;}
  .trip .desc{font-weight:600;font-size:15px;}
  .trip .meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .trip .right{text-align:right;}
  .trip .amount{font-weight:700;color:var(--accent);font-size:15px;}
  .trip .actions{display:flex;gap:10px;margin-top:4px;justify-content:flex-end;}
  .trip .del{color:var(--danger);font-size:12px;background:none;border:none;padding:0;}
  .trip .edit{color:var(--accent);font-size:12px;background:none;border:none;padding:0;}
  .filter-row{display:flex;gap:10px;margin-bottom:12px;}
  .filter-row > div{flex:1;}
  .cancel-edit{background:var(--card2);color:var(--muted);width:100%;margin-top:8px;}
  .editing-banner{background:#3b2f0f;color:#fbbf24;border-radius:10px;padding:8px 12px;font-size:12px;margin-bottom:10px;}
  .empty{text-align:center;color:var(--muted);padding:30px 0;font-size:14px;}
  .section-title{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  .export-row{display:flex;gap:10px;margin-top:10px;}
  .export-row button{flex:1;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:50;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <h1>🚗 Kilometrówka</h1>
  <div class="sub">Rozliczanie kursów za przewóz osób</div>
</header>

<main>
  <div class="card summary">
    <div class="box"><div class="val" id="sumKm">0</div><div class="lab">km łącznie</div></div>
    <div class="box"><div class="val" id="sumKwota">0</div><div class="lab">do zapłaty</div></div>
    <div class="box"><div class="val" id="sumLiczba">0</div><div class="lab">kursów</div></div>
  </div>

  <div class="card" id="newTripCard">
    <div class="section-title">Nowy kurs</div>
    <div class="mode-toggle">
      <button id="modeDistBtn" class="active">Podaj km</button>
      <button id="modeOdoBtn">Licznik start/koniec</button>
    </div>

    <div id="distMode">
      <label>Liczba kilometrów</label>
      <input type="number" inputmode="decimal" id="distKm" placeholder="np. 12.5">
    </div>

    <div id="odoMode" style="display:none;">
      <div class="row">
        <div>
          <label>Licznik - start</label>
          <input type="number" inputmode="decimal" id="odoStart" placeholder="np. 45210">
        </div>
        <div>
          <label>Licznik - koniec</label>
          <input type="number" inputmode="decimal" id="odoEnd" placeholder="np. 45223">
        </div>
      </div>
    </div>

    <label>Opis (opcjonalnie)</label>
    <input type="text" id="desc" placeholder="np. Jan Kowalski - lotnisko">

    <div class="row">
      <div>
        <label>Waluta</label>
        <select id="currencySelect">
          <option value="PLN">PLN (zł)</option>
          <option value="EUR">EUR (€)</option>
        </select>
      </div>
      <div>
        <label>Stawka za km</label>
        <input type="number" inputmode="decimal" step="0.01" id="rateInput">
      </div>
    </div>

    <div id="editingBanner" class="editing-banner" style="display:none;">Edytujesz istniejący kurs</div>
    <button class="btn-primary" id="addBtn">Dodaj kurs</button>
    <button class="cancel-edit" id="cancelEditBtn" style="display:none;">Anuluj edycję</button>
  </div>

  <div class="card">
    <div class="section-title">Historia kursów</div>
    <div class="filter-row">
      <div>
        <label>Miesiąc</label>
        <select id="filterMonth"><option value="all">Wszystkie</option></select>
      </div>
      <div>
        <label>Sortuj</label>
        <select id="sortSelect">
          <option value="date_desc">Data: najnowsze</option>
          <option value="date_asc">Data: najstarsze</option>
          <option value="amount_desc">Kwota: malejąco</option>
          <option value="amount_asc">Kwota: rosnąco</option>
          <option value="km_desc">Km: malejąco</option>
          <option value="km_asc">Km: rosnąco</option>
        </select>
      </div>
    </div>
    <div id="tripList"></div>
    <div class="export-row">
      <button class="btn-secondary" id="exportBtn">Eksport CSV</button>
      <button class="btn-secondary" id="exportPdfBtn">Eksport PDF</button>
    </div>
    <div class="export-row">
      <button class="btn-danger" id="clearBtn">Wyczyść wszystko</button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'kilometrowka_trips';
const RATE_KEY_PREFIX = 'kilometrowka_rate_';
const CURRENCY_KEY = 'kilometrowka_currency';
const DEFAULT_RATES = { PLN: 1.15, EUR: 0.30 };
const CURRENCY_SYMBOL = { PLN: 'zł', EUR: '€' };

let trips = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currency = localStorage.getItem(CURRENCY_KEY) || 'PLN';
let rates = {
  PLN: parseFloat(localStorage.getItem(RATE_KEY_PREFIX + 'PLN')) || DEFAULT_RATES.PLN,
  EUR: parseFloat(localStorage.getItem(RATE_KEY_PREFIX + 'EUR')) || DEFAULT_RATES.EUR
};
let mode = 'dist';
let editingId = null;
let filterMonth = 'all';
let sortBy = 'date_desc';

const rateInput = document.getElementById('rateInput');
const currencySelect = document.getElementById('currencySelect');
currencySelect.value = currency;
rateInput.value = rates[currency];

currencySelect.addEventListener('change', () => {
  currency = currencySelect.value;
  localStorage.setItem(CURRENCY_KEY, currency);
  rateInput.value = rates[currency];
});

rateInput.addEventListener('change', () => {
  const v = parseFloat(rateInput.value);
  if (!isNaN(v) && v > 0) {
    rates[currency] = v;
    localStorage.setItem(RATE_KEY_PREFIX + currency, v);
    render();
    showToast('Stawka zapisana: ' + v.toFixed(2) + ' ' + CURRENCY_SYMBOL[currency] + '/km');
  }
});

document.getElementById('modeDistBtn').addEventListener('click', () => setMode('dist'));
document.getElementById('modeOdoBtn').addEventListener('click', () => setMode('odo'));

function setMode(m){
  mode = m;
  document.getElementById('modeDistBtn').classList.toggle('active', m==='dist');
  document.getElementById('modeOdoBtn').classList.toggle('active', m==='odo');
  document.getElementById('distMode').style.display = m==='dist' ? 'block' : 'none';
  document.getElementById('odoMode').style.display = m==='odo' ? 'block' : 'none';
}

document.getElementById('addBtn').addEventListener('click', () => {
  let km;
  if (mode === 'dist') {
    km = parseFloat(document.getElementById('distKm').value);
  } else {
    const start = parseFloat(document.getElementById('odoStart').value);
    const end = parseFloat(document.getElementById('odoEnd').value);
    km = end - start;
  }
  if (isNaN(km) || km <= 0) {
    showToast('Podaj poprawną liczbę kilometrów');
    return;
  }
  const desc = document.getElementById('desc').value.trim();
  const rate = parseFloat(rateInput.value) || rates[currency];

  if (editingId !== null) {
    const t = trips.find(x => x.id === editingId);
    if (t) {
      t.km = Math.round(km * 100) / 100;
      t.rate = rate;
      t.currency = currency;
      t.desc = desc;
    }
    save();
    render();
    exitEditMode();
    showToast('Zapisano zmiany');
  } else {
    const trip = {
      id: Date.now(),
      date: new Date().toISOString(),
      km: Math.round(km * 100) / 100,
      rate: rate,
      currency: currency,
      desc: desc
    };
    trips.unshift(trip);
    save();
    render();
    clearForm();
    showToast('Dodano kurs: ' + trip.km + ' km');
  }
});

document.getElementById('cancelEditBtn').addEventListener('click', () => {
  exitEditMode();
  clearForm();
  showToast('Anulowano edycję');
});

function editTrip(id){
  const t = trips.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  setMode('dist');
  document.getElementById('distKm').value = t.km;
  document.getElementById('desc').value = t.desc || '';
  currency = tripCurrency(t);
  currencySelect.value = currency;
  rateInput.value = t.rate;
  document.getElementById('addBtn').textContent = 'Zapisz zmiany';
  document.getElementById('cancelEditBtn').style.display = 'block';
  document.getElementById('editingBanner').style.display = 'block';
  document.getElementById('newTripCard').scrollIntoView({behavior:'smooth'});
}

function exitEditMode(){
  editingId = null;
  document.getElementById('addBtn').textContent = 'Dodaj kurs';
  document.getElementById('cancelEditBtn').style.display = 'none';
  document.getElementById('editingBanner').style.display = 'none';
  rateInput.value = rates[currency];
}

function clearForm(){
  document.getElementById('distKm').value = '';
  document.getElementById('odoStart').value = '';
  document.getElementById('odoEnd').value = '';
  document.getElementById('desc').value = '';
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(trips));
}

function deleteTrip(id){
  trips = trips.filter(t => t.id !== id);
  save();
  render();
}

function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('pl-PL', {day:'2-digit', month:'2-digit', year:'numeric'}) + ' ' +
         d.toLocaleTimeString('pl-PL', {hour:'2-digit', minute:'2-digit'});
}

function tripCurrency(t){ return t.currency || 'PLN'; }
function symbolFor(cur){ return CURRENCY_SYMBOL[cur] || cur; }
function monthKey(iso){ return iso.slice(0,7); }
function monthLabel(key){
  const [y,m] = key.split('-');
  const names = ['styczeń','luty','marzec','kwiecień','maj','czerwiec','lipiec','sierpień','wrzesień','październik','listopad','grudzień'];
  return names[parseInt(m,10)-1] + ' ' + y;
}

const filterMonthSelect = document.getElementById('filterMonth');
const sortSelectEl = document.getElementById('sortSelect');
filterMonthSelect.addEventListener('change', () => { filterMonth = filterMonthSelect.value; render(); });
sortSelectEl.addEventListener('change', () => { sortBy = sortSelectEl.value; render(); });

function sortTrips(list){
  const sorted = list.slice();
  switch (sortBy) {
    case 'date_asc': sorted.sort((a,b) => new Date(a.date) - new Date(b.date)); break;
    case 'amount_desc': sorted.sort((a,b) => (b.km*b.rate) - (a.km*a.rate)); break;
    case 'amount_asc': sorted.sort((a,b) => (a.km*a.rate) - (b.km*b.rate)); break;
    case 'km_desc': sorted.sort((a,b) => b.km - a.km); break;
    case 'km_asc': sorted.sort((a,b) => a.km - b.km); break;
    default: sorted.sort((a,b) => new Date(b.date) - new Date(a.date));
  }
  return sorted;
}

function render(){
  const months = [...new Set(trips.map(t => monthKey(t.date)))].sort().reverse();
  const prevValue = filterMonthSelect.value;
  filterMonthSelect.innerHTML = '<option value="all">Wszystkie</option>' +
    months.map(m => `<option value="${m}">${monthLabel(m)}</option>`).join('');
  filterMonthSelect.value = months.includes(prevValue) || prevValue === 'all' ? prevValue : 'all';
  filterMonth = filterMonthSelect.value;

  let visible = filterMonth === 'all' ? trips : trips.filter(t => monthKey(t.date) === filterMonth);
  visible = sortTrips(visible);

  const list = document.getElementById('tripList');
  if (visible.length === 0) {
    list.innerHTML = '<div class="empty">Brak kursów w wybranym okresie.</div>';
  } else {
    list.innerHTML = visible.map(t => {
      const cur = tripCurrency(t);
      const amount = (t.km * t.rate).toFixed(2);
      return `<div class="trip">
        <div class="left">
          <div class="desc">${t.desc || 'Kurs'} — ${t.km} km</div>
          <div class="meta">${fmtDate(t.date)} · ${t.rate.toFixed(2)} ${symbolFor(cur)}/km</div>
        </div>
        <div class="right">
          <div class="amount">${amount} ${symbolFor(cur)}</div>
          <div class="actions">
            <button class="edit" onclick="editTrip(${t.id})">Edytuj</button>
            <button class="del" onclick="deleteTrip(${t.id})">Usuń</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  const totalKm = visible.reduce((s,t) => s + t.km, 0);
  const totalsByCurrency = {};
  visible.forEach(t => {
    const cur = tripCurrency(t);
    totalsByCurrency[cur] = (totalsByCurrency[cur] || 0) + t.km * t.rate;
  });
  const kwotaText = Object.keys(totalsByCurrency).length === 0
    ? '0'
    : Object.entries(totalsByCurrency).map(([cur, amt]) => amt.toFixed(2) + ' ' + symbolFor(cur)).join(' + ');

  document.getElementById('sumKm').textContent = totalKm.toFixed(1);
  document.getElementById('sumKwota').textContent = kwotaText;
  document.getElementById('sumLiczba').textContent = visible.length;
}

document.getElementById('exportBtn').addEventListener('click', () => {
  if (trips.length === 0) { showToast('Brak danych do eksportu'); return; }
  let csv = 'Data;Opis;Km;Waluta;Stawka;Kwota\n';
  trips.slice().reverse().forEach(t => {
    const cur = tripCurrency(t);
    const amount = (t.km * t.rate).toFixed(2);
    csv += `${fmtDate(t.date)};${(t.desc||'').replace(/;/g,',')};${t.km};${cur};${t.rate.toFixed(2)};${amount}\n`;
  });
  const blob = new Blob(['﻿' + csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'kilometrowka_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

document.getElementById('exportPdfBtn').addEventListener('click', () => {
  if (trips.length === 0) { showToast('Brak danych do eksportu'); return; }

  const totalsByCurrency = {};
  trips.forEach(t => {
    const cur = tripCurrency(t);
    totalsByCurrency[cur] = (totalsByCurrency[cur] || 0) + t.km * t.rate;
  });
  const totalKm = trips.reduce((s,t) => s + t.km, 0);

  const byMonth = {};
  trips.forEach(t => {
    const key = monthKey(t.date);
    (byMonth[key] = byMonth[key] || []).push(t);
  });
  const monthKeys = Object.keys(byMonth).sort().reverse();

  const sectionsHtml = monthKeys.map(key => {
    const monthTrips = byMonth[key].slice().sort((a,b) => new Date(b.date) - new Date(a.date));
    const monthKm = monthTrips.reduce((s,t) => s + t.km, 0);
    const monthTotals = {};
    monthTrips.forEach(t => {
      const cur = tripCurrency(t);
      monthTotals[cur] = (monthTotals[cur] || 0) + t.km * t.rate;
    });
    const monthTotalsText = Object.entries(monthTotals).map(([cur,amt]) => amt.toFixed(2) + ' ' + symbolFor(cur)).join(' + ');

    const rows = monthTrips.map(t => {
      const cur = tripCurrency(t);
      const amount = (t.km * t.rate).toFixed(2);
      return `<tr>
        <td>${fmtDate(t.date)}</td>
        <td>${(t.desc || 'Kurs').replace(/</g,'&lt;')}</td>
        <td style="text-align:right">${t.km}</td>
        <td style="text-align:right">${t.rate.toFixed(2)} ${symbolFor(cur)}</td>
        <td style="text-align:right">${amount} ${symbolFor(cur)}</td>
      </tr>`;
    }).join('');

    return `<h2>${monthLabel(key)}</h2>
    <table>
      <thead><tr><th>Data</th><th>Opis</th><th style="text-align:right">Km</th><th style="text-align:right">Stawka</th><th style="text-align:right">Kwota</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="month-total">Suma za ${monthLabel(key)}: ${monthKm.toFixed(1)} km · ${monthTotalsText}</div>`;
  }).join('');

  const totalsHtml = Object.entries(totalsByCurrency)
    .map(([cur, amt]) => `<div>${amt.toFixed(2)} ${symbolFor(cur)}</div>`).join('');

  const html = `<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8">
<title>Kilometrówka - raport</title>
<style>
  body{font-family:-apple-system,Arial,sans-serif;color:#111;margin:24px;}
  h1{font-size:20px;margin-bottom:2px;}
  h2{font-size:15px;margin:24px 0 8px;text-transform:capitalize;border-bottom:1px solid #ccc;padding-bottom:4px;}
  h2:first-of-type{margin-top:16px;}
  .sub{color:#555;font-size:12px;margin-bottom:20px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;border-bottom:2px solid #333;padding:6px 8px;font-size:12px;text-transform:uppercase;color:#444;}
  td{padding:6px 8px;border-bottom:1px solid #ddd;}
  .month-total{text-align:right;font-size:12px;color:#333;font-weight:600;margin-top:6px;}
  .totals{margin-top:24px;padding-top:14px;border-top:2px solid #333;text-align:right;}
  .totals .row{display:flex;justify-content:flex-end;gap:16px;font-size:14px;margin-bottom:4px;}
  .totals .label{color:#555;}
  .totals .grand{font-size:18px;font-weight:700;margin-top:6px;}
  @media print{ body{margin:10mm;} h2{page-break-after:avoid;} tr{page-break-inside:avoid;} }
</style></head>
<body>
  <h1>Kilometrówka — raport kursów</h1>
  <div class="sub">Wygenerowano: ${fmtDate(new Date().toISOString())} · Liczba kursów: ${trips.length} · Suma km: ${totalKm.toFixed(1)}</div>
  ${sectionsHtml}
  <div class="totals">
    <div class="row"><span class="label">Suma km (wszystko):</span><span>${totalKm.toFixed(1)}</span></div>
    <div class="grand">${totalsHtml}</div>
  </div>
  <script>window.onload = () => setTimeout(() => window.print(), 250);<\/script>
</body></html>`;

  const w = window.open('', '_blank');
  if (!w) { showToast('Zablokowano okno — zezwól na wyskakujące okienka'); return; }
  w.document.open();
  w.document.write(html);
  w.document.close();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (confirm('Na pewno usunąć wszystkie kursy? Tej operacji nie można cofnąć.')) {
    trips = [];
    save();
    render();
    showToast('Wyczyszczono historię');
  }
});

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
